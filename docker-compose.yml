services:
  db:
    image: postgres:16-alpine
    container_name: farmapp-postgres
    environment:
      POSTGRES_DB: farmapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d farmapp"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: farmapp-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/farmapp?schema=public
      PORT: 3000
    ports:
      - "3000:3000"

  seed:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/farmapp?schema=public
      PORT: 3000
    command: ["sh", "-c", "npm run prisma:push --workspace apps/api && npm run prisma:seed --workspace apps/api"]

volumes:
  postgres_data:
